<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARR Bot Office - Pixel Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #f1c40f;
            font-size: 24px;
            text-shadow: 4px 4px 0 #e74c3c;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #3498db;
            font-size: 10px;
        }
        
        .office {
            max-width: 900px;
            margin: 0 auto;
            background: #16213e;
            border: 4px solid #0f3460;
            padding: 20px;
            position: relative;
        }
        
        .office::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, #0f3460 0%, transparent 100%);
            pointer-events: none;
        }
        
        .floor {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding-top: 20px;
        }
        
        .desk {
            width: 200px;
            background: #2c3e50;
            border: 4px solid #34495e;
            padding: 15px;
            position: relative;
        }
        
        .desk::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 10px;
            background: #7f8c8d;
            border-radius: 2px 2px 0 0;
        }
        
        .desk-title {
            text-align: center;
            font-size: 8px;
            color: #f39c12;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .agent {
            width: 64px;
            height: 64px;
            margin: 10px auto;
            position: relative;
            image-rendering: pixelated;
        }
        
        .agent-avatar {
            width: 64px;
            height: 64px;
            background: #e74c3c;
            position: relative;
        }
        
        /* Pixel art head */
        .agent-avatar::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 16px;
            width: 32px;
            height: 24px;
            background: #f1c40f;
        }
        
        /* Eyes */
        .agent-avatar::after {
            content: '';
            position: absolute;
            top: 16px;
            left: 20px;
            width: 8px;
            height: 8px;
            background: #2c3e50;
            box-shadow: 16px 0 0 #2c3e50;
        }
        
        /* Body */
        .agent-body {
            width: 64px;
            height: 24px;
            background: #3498db;
            margin-top: -4px;
        }
        
        .agent-body::after {
            content: '';
            display: block;
            width: 64px;
            height: 8px;
            background: #2980b9;
        }
        
        /* Status indicator */
        .status {
            text-align: center;
            font-size: 8px;
            margin-top: 10px;
            padding: 5px;
            border-radius: 4px;
        }
        
        .status.idle {
            background: #7f8c8d;
            color: #ecf0f1;
        }
        
        .status.working {
            background: #27ae60;
            color: #fff;
            animation: pulse 1s infinite;
        }
        
        .status.thinking {
            background: #9b59b6;
            color: #fff;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .task-bubble {
            background: #ecf0f1;
            color: #2c3e50;
            font-size: 6px;
            padding: 6px;
            margin-top: 8px;
            border-radius: 4px;
            text-align: center;
            min-height: 30px;
            word-wrap: break-word;
        }
        
        .timestamp {
            text-align: center;
            font-size: 8px;
            color: #7f8c8d;
            margin-top: 20px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 16px;
            color: #2ecc71;
        }
        
        .stat-label {
            font-size: 8px;
            color: #95a5a6;
            margin-top: 5px;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 8px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        .legend-dot.working { background: #27ae60; }
        .legend-dot.thinking { background: #9b59b6; }
        .legend-dot.idle { background: #7f8c8d; }
        
        @media (max-width: 600px) {
            .desk { width: 150px; }
            .header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 ARR Bot Office</h1>
        <div class="subtitle">Real-time Agent Workspace Visualization</div>
    </div>
    
    <div class="office">
        <div class="floor" id="officeFloor">
            <!-- Desks will be rendered here -->
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="activeCount">0</div>
                <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">Tasks Today</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="uptime">--</div>
                <div class="stat-label">Session Uptime</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot working"></div>
                <span>Working</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot thinking"></div>
                <span>Thinking</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot idle"></div>
                <span>Idle</span>
            </div>
        </div>
        
        <div class="timestamp" id="timestamp">Last updated: --</div>
    </div>

    <script>
        const agents = [
            {
                id: 'arr-bot',
                name: 'ARR_Bot',
                color: '#e74c3c',
                role: 'Main Agent',
                status: 'working',
                task: 'Processing kanban backlog tasks'
            },
            {
                id: 'arr-guardian',
                name: 'ARR Guardian',
                color: '#3498db',
                role: 'Stack Monitor',
                status: 'idle',
                task: 'Monitoring Docker containers'
            },
            {
                id: 'health-bot',
                name: 'Health Bot',
                color: '#2ecc71',
                role: 'System Health',
                status: 'thinking',
                task: 'Analyzing system metrics'
            }
        ];
        
        function renderOffice() {
            const floor = document.getElementById('officeFloor');
            floor.innerHTML = '';
            
            let activeCount = 0;
            
            agents.forEach(agent => {
                if (agent.status !== 'idle') activeCount++;
                
                const desk = document.createElement('div');
                desk.className = 'desk';
                desk.innerHTML = `
                    <div class="desk-title">${agent.name}</div>
                    <div class="agent">
                        <div class="agent-avatar" style="background: ${agent.color}">
                            <div style="position:absolute;top:8px;left:16px;width:32px;height:24px;background:rgba(255,255,255,0.3)"></div>
                            <div style="position:absolute;top:14px;left:22px;width:4px;height:4px;background:#2c3e50"></div>
                            <div style="position:absolute;top:14px;left:38px;width:4px;height:4px;background:#2c3e50"></div>
                        </div>
                        <div class="agent-body" style="background: ${agent.color}; box-shadow: 0 -4px 0 ${adjustColor(agent.color, -20)}"></div>
                    </div>
                    <div class="status ${agent.status}">${agent.status.toUpperCase()}</div>
                    <div class="task-bubble">${agent.task}</div>
                `;
                floor.appendChild(desk);
            });
            
            document.getElementById('activeCount').textContent = activeCount;
            document.getElementById('timestamp').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }
        
        function adjustColor(hex, amount) {
            const num = parseInt(hex.slice(1), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
        }
        
        // Simulate real-time updates
        function simulateActivity() {
            const randomAgent = agents[Math.floor(Math.random() * agents.length)];
            const tasks = [
                'Processing kanban tasks',
                'Monitoring Docker containers',
                'Analyzing system metrics',
                'Checking cron jobs',
                'Updating memory',
                'Processing WhatsApp messages',
                'Running health checks'
            ];
            
            if (Math.random() > 0.7) {
                randomAgent.task = tasks[Math.floor(Math.random() * tasks.length)];
                randomAgent.status = Math.random() > 0.5 ? 'working' : 'thinking';
                
                setTimeout(() => {
                    randomAgent.status = 'idle';
                    renderOffice();
                }, 3000);
            }
            
            renderOffice();
        }
        
        // Initialize
        renderOffice();
        
        // Update every 5 seconds
        setInterval(simulateActivity, 5000);
        
        // Update timestamp
        setInterval(() => {
            document.getElementById('timestamp').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }, 1000);
    </script>
</body>
</html>
